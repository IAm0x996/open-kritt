name: 🐛 Bug report
description: Report a problem with open·kritt
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please **do not** report security vulnerabilities here —
        use [private reporting](../security/policy) instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I reproduced this on the latest version / `main`.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - frontend
        - backend
        - engine
        - database
        - executor-view
        - docker / compose
        - not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant logs or stack traces.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Value of the root `VERSION` file (or the sidebar version).
      placeholder: '1.0.0'
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, how you run it (Docker Compose / local), model/provider + harness.
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04
        - Run mode: docker compose
        - Harness/model: codex / gpt-5.5
