name: ✨ Feature request
description: Suggest an idea or improvement for open·kritt
labels: ['enhancement', 'needs-triage']
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions and this isn't a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Sketches, API shapes, and UI ideas welcome.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which area?
      options:
        - frontend
        - backend
        - engine
        - database
        - docs
        - workflows / scanning
        - not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related tools, screenshots.
