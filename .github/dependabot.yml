# Dependabot keeps dependencies patched across every ecosystem in the monorepo.
# Grouped minor/patch updates keep PR noise down; majors come as individual PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ---- JavaScript (npm) ----
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ['dependencies', 'frontend']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      frontend-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ['dependencies', 'backend']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      backend-minor-patch:
        update-types: ['minor', 'patch']

  # ---- Python (pip) ----
  - package-ecosystem: pip
    directory: /engine
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ['dependencies', 'engine']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      engine-minor-patch:
        update-types: ['minor', 'patch']

  # ---- GitHub Actions ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ['dependencies', 'ci']
    commit-message:
      prefix: 'ci(deps)'
    groups:
      actions:
        update-types: ['minor', 'patch']

  # ---- Docker base images (one entry per Dockerfile directory) ----
  - package-ecosystem: docker
    directories:
      - /frontend
      - /backend
      - /engine
      - /database
      - /executor-view
    schedule:
      interval: weekly
    labels: ['dependencies', 'docker']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      docker-base-images:
        update-types: ['minor', 'patch']
